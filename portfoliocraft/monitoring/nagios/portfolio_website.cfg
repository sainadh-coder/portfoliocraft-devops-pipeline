define host {
    use                     linux-server
    host_name               portfoliocraft-host
    alias                   PortfolioCraft Website Host
    address                 host.docker.internal
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               portfoliocraft-host
    service_description     HTTP Website Check
    check_command           check_http!-p 8080 -u /
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               portfoliocraft-host
    service_description     Health Endpoint Check
    check_command           check_http!-p 8080 -u /healthz -s "ok"
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
