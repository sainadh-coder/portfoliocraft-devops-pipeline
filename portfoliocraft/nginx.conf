server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 5;

    location = /healthz {
        default_type text/plain;
        return 200 "ok";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
