apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfoliocraft-deployment
  labels:
    app: portfoliocraft
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfoliocraft
  template:
    metadata:
      labels:
        app: portfoliocraft
    spec:
      containers:
        - name: portfoliocraft
          image: portfoliocraft:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
